name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install build
          python -m build
          pip install dist/musren-*.whl
          
      - name: Run tests
        run: pytest -q --ignore=tests/test_imports.py --ignore=tests/test_rename.py
        
      - name: Check imports
        run: python -c "from core.cli.shell import cli; print('OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install build
          python -m build
          pip install dist/musren-*.whl
          
      - name: Check CLI
        run: musren --version || true